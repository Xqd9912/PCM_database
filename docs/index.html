<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PCM Database</title>
<script src="vendor/three.min.js"></script>
<script src="vendor/OrbitControls.js"></script>
<style>
:root{
  --plane:#f9f9f7; --surface:#fcfcfb; --ink:#0b0b0b; --ink2:#52514e; --muted:#898781;
  --grid:#e1e0d9; --axis:#c3c2b7; --series:#2a78d6; --series-soft:#cde2fb;
  --accent2:#1baf7a; --border:rgba(11,11,11,0.10); --shadow:rgba(11,11,11,0.06);
  --viewer-bg:#ffffff;
}
@media (prefers-color-scheme:dark){:root{
  --plane:#0d0d0d; --surface:#1a1a19; --ink:#fff; --ink2:#c3c2b7; --muted:#898781;
  --grid:#2c2c2a; --axis:#383835; --series:#3987e5; --series-soft:#184f95;
  --accent2:#199e70; --border:rgba(255,255,255,0.10); --shadow:rgba(0,0,0,0.4);
  --viewer-bg:#111110;
}}
:root[data-theme=dark]{
  --plane:#0d0d0d; --surface:#1a1a19; --ink:#fff; --ink2:#c3c2b7; --muted:#898781;
  --grid:#2c2c2a; --axis:#383835; --series:#3987e5; --series-soft:#184f95;
  --accent2:#199e70; --border:rgba(255,255,255,0.10); --shadow:rgba(0,0,0,0.4); --viewer-bg:#111110;
}
:root[data-theme=light]{
  --plane:#f9f9f7; --surface:#fcfcfb; --ink:#0b0b0b; --ink2:#52514e; --muted:#898781;
  --grid:#e1e0d9; --axis:#c3c2b7; --series:#2a78d6; --series-soft:#cde2fb;
  --accent2:#1baf7a; --border:rgba(11,11,11,0.10); --shadow:rgba(11,11,11,0.06); --viewer-bg:#ffffff;
}
*{box-sizing:border-box}
html,body{margin:0;background:var(--plane);color:var(--ink);
  font-family:system-ui,-apple-system,"Segoe UI",sans-serif;line-height:1.5;-webkit-text-size-adjust:100%}
a{color:var(--series)}
.wrap{max-width:1180px;margin:0 auto;padding:0 20px}
.topbar{position:absolute;top:16px;right:20px;display:flex;gap:8px}
.tbtn{background:var(--surface);color:var(--ink2);border:1px solid var(--border);border-radius:8px;
  padding:6px 12px;cursor:pointer;font-size:13px;font-family:inherit}
.tbtn:hover{color:var(--ink)}
header{padding:44px 0 20px;border-bottom:1px solid var(--border)}
.eyebrow{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:600}
h1{font-size:32px;margin:.25em 0 .1em;letter-spacing:-.01em}
.sub{color:var(--ink2);max-width:64ch;font-size:15px}
.tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin:24px 0 4px}
.tile{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 18px;box-shadow:0 1px 2px var(--shadow)}
.tile .v{font-size:28px;font-weight:650;letter-spacing:-.02em}
.tile .l{font-size:12.5px;color:var(--muted);margin-top:2px}
section{padding:30px 0}
h2{font-size:15px;letter-spacing:.02em;margin:0 0 2px}
.hint{color:var(--muted);font-size:12.5px;margin:0 0 16px}
.charts{display:grid;grid-template-columns:1fr 1fr;gap:22px}
@media(max-width:820px){.charts{grid-template-columns:1fr}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 18px 12px;box-shadow:0 1px 2px var(--shadow)}
.card.full{grid-column:1/-1}
.card h3{font-size:13.5px;margin:0 0 12px;font-weight:600}
svg{display:block;width:100%;overflow:visible}
.bar{fill:var(--series)} .bar:hover{fill:var(--accent2)}
text{fill:var(--ink2);font-size:11px}
.axis-line{stroke:var(--axis);stroke-width:1} .grid-line{stroke:var(--grid);stroke-width:1}
.tt{position:fixed;pointer-events:none;background:var(--ink);color:var(--plane);padding:6px 9px;border-radius:7px;
  font-size:12px;opacity:0;transition:opacity .1s;z-index:60;white-space:nowrap;box-shadow:0 4px 14px rgba(0,0,0,.25)}
/* periodic table */
.ptable{display:grid;grid-template-columns:repeat(18,1fr);gap:3px;max-width:760px;margin:4px 0 6px}
.pt{aspect-ratio:1;border:1px solid var(--border);border-radius:4px;background:var(--surface);
  display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--muted);user-select:none}
.pt.on{cursor:pointer;color:var(--ink);font-weight:600}
.pt.on:hover{border-color:var(--series)}
.pt.sel{background:var(--series);color:#fff;border-color:var(--series)}
.pt.empty{border:none;background:transparent}
.ptrow{display:flex;gap:10px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
.controls{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px;align-items:center}
.controls input,.controls select{background:var(--surface);color:var(--ink);border:1px solid var(--border);
  border-radius:8px;padding:8px 11px;font-size:13.5px;font-family:inherit}
.controls input[type=search]{min-width:220px;flex:1}
.count{color:var(--muted);font-size:12.5px;margin-left:auto}
.tblwrap{overflow-x:auto;border:1px solid var(--border);border-radius:12px;background:var(--surface)}
table{border-collapse:collapse;width:100%;font-size:13px}
th,td{text-align:left;padding:9px 12px;border-bottom:1px solid var(--border);white-space:nowrap}
th{position:sticky;top:0;background:var(--surface);cursor:pointer;user-select:none;font-weight:600;color:var(--ink2);z-index:1}
th:hover{color:var(--ink)}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
td.path{max-width:300px;overflow:hidden;text-overflow:ellipsis;color:var(--muted);font-size:12px}
tbody tr{cursor:pointer} tbody tr:hover{background:color-mix(in srgb,var(--series) 8%,transparent)}
.pill{display:inline-block;padding:1px 8px;border-radius:999px;font-size:11.5px;background:var(--series-soft);color:var(--series);font-weight:600}
.act{color:var(--series);font-weight:600}
footer{padding:30px 0 60px;color:var(--muted);font-size:12.5px;border-top:1px solid var(--border)}
code{background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:1px 5px;font-size:12px}
.load{padding:40px;text-align:center;color:var(--muted)}
/* modal */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
.modal.open{display:flex}
.mbox{background:var(--surface);border:1px solid var(--border);border-radius:14px;width:min(720px,100%);max-height:92vh;
  overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.mhead{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.mhead h3{margin:0;font-size:17px}
.mclose{background:none;border:none;color:var(--ink2);font-size:20px;cursor:pointer;line-height:1}
#viewer3d{width:100%;height:400px;position:relative;background:var(--viewer-bg)}
.mmeta{padding:14px 20px;display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px 18px;font-size:13px}
.mmeta div span{color:var(--muted);display:block;font-size:11.5px}
.mfoot{padding:0 20px 18px;display:flex;gap:10px;flex-wrap:wrap}
.btn{display:inline-block;background:var(--series);color:#fff;border:none;border-radius:8px;padding:9px 15px;
  font-size:13.5px;font-family:inherit;cursor:pointer;text-decoration:none}
.btn.ghost{background:var(--surface);color:var(--ink2);border:1px solid var(--border)}
</style>
</head>
<body>
<div class="topbar">
  <button class="tbtn" id="langBtn">EN</button>
  <button class="tbtn" id="themeBtn">◐</button>
</div>
<div class="wrap">
  <header>
    <div class="eyebrow">Phase-Change Materials · OTS · SOM</div>
    <h1 data-i18n="title_h">PCM 结构数据库</h1>
    <p class="sub" data-i18n="subtitle"></p>
  </header>

  <div class="tiles" id="tiles"></div>

  <section>
    <h2 data-i18n="overview"></h2>
    <p class="hint" data-i18n="overview_hint"></p>
    <div class="charts">
      <div class="card"><h3 data-i18n="chart_sys"></h3><svg id="sysChart"></svg></div>
      <div class="card"><h3 data-i18n="chart_natom"></h3><svg id="natomChart"></svg></div>
      <div class="card full"><h3 data-i18n="chart_dens"></h3><svg id="densChart"></svg></div>
    </div>
  </section>

  <section>
    <h2 data-i18n="explore"></h2>
    <p class="hint" data-i18n="pt_hint"></p>
    <div class="ptable" id="ptable"></div>
    <div class="ptrow">
      <span id="selEls" class="hint" style="margin:0"></span>
      <button class="tbtn" id="clearEls" data-i18n="clear"></button>
    </div>
    <div class="controls">
      <input type="search" id="q" data-i18n-ph="search_ph">
      <select id="sysF"></select>
      <select id="tempF"></select>
      <span class="count" id="shown"></span>
    </div>
    <div class="tblwrap"><table id="tbl">
      <thead><tr>
        <th data-k="formula" data-i18n="c_formula"></th>
        <th data-k="system" data-i18n="c_system"></th>
        <th data-k="phase" data-i18n="c_phase"></th>
        <th data-k="temperature" data-i18n="c_temp"></th>
        <th class="num" data-k="natoms" data-i18n="c_natoms"></th>
        <th class="num" data-k="density" data-i18n="c_density"></th>
        <th data-k="source_frame" data-i18n="c_frame"></th>
        <th data-i18n="c_view"></th>
      </tr></thead>
      <tbody id="tbody"><tr><td colspan="8" class="load">…</td></tr></tbody>
    </table></div>
  </section>

  <footer><span data-i18n="footer"></span></footer>
</div>

<div class="tt" id="tt"></div>

<div class="modal" id="modal">
  <div class="mbox">
    <div class="mhead"><h3 id="mTitle"></h3><button class="mclose" id="mClose">✕</button></div>
    <div id="viewer3d"></div>
    <div class="mmeta" id="mMeta"></div>
    <div class="mfoot">
      <a class="btn" id="mDownload" download><span data-i18n="dl_poscar"></span></a>
      <button class="btn ghost" id="mStyle" data-i18n="toggle_style"></button>
    </div>
  </div>
</div>

<script>
/* ---------- i18n ---------- */
const I18N={
 zh:{title:'PCM 结构数据库',title_h:'PCM 结构数据库',
   subtitle:'相变材料/OTS/SOM 的第一性原理非晶结构库。每条记录为一个代表性非晶模型，来自课题组 HPC 熔淬-优化流程，可按成分、元素、原子数、密度检索，支持 3D 预览与下载。',
   overview:'数据概览',overview_hint:'悬停查看数值。当前库内相态均为非晶（amorphous）。',
   chart_sys:'材料体系 Top 15（按结构数）',chart_natom:'体系原子数分布',chart_dens:'数密度分布 (Atom/Å³)',
   explore:'结构浏览',pt_hint:'点击元素周期表筛选（含全部所选元素的结构）；再点搜索/下拉细化；点表格行可 3D 预览。',
   clear:'清除元素',search_ph:'搜索化学式 / 体系 / 来源路径…',
   c_formula:'化学式',c_system:'体系',c_phase:'相',c_temp:'温度',c_natoms:'原子数',c_density:'数密度',c_frame:'代表帧',c_view:'预览',
   view:'▶ 3D',t_total:'结构总数',t_sys:'材料体系',t_natoms:'原子数范围',t_dens:'数密度中位',t_phase:'相态',phase_amor:'非晶',
   shown:(a,b)=>`显示 ${a} / ${b}`,sel_none:'未选元素',sel_pre:'已选：',
   dl_poscar:'⬇ 下载 POSCAR',toggle_style:'切换显示（球棍/填充）',
   m_natoms:'原子数',m_dens:'数密度',m_temp:'温度',m_phase:'相',m_contrib:'贡献者',m_src:'HPC 来源',
   footer:'数据与代码托管于本仓库。构建主库 python scripts/build_asedb.py；查询 ase db data/pcm.db；贡献 python scripts/add_structure.py（详见 README）。',
   noload:'无法加载 data.json —— 请通过 HTTP 或 GitHub Pages 访问，而非直接双击打开。'},
 en:{title:'PCM Structure Database',title_h:'PCM Structure Database',
   subtitle:'A first-principles amorphous structure database for phase-change / OTS / SOM materials. Each record is a representative amorphous model from the group’s HPC melt-quench workflow. Search by composition, element, atom count and density; preview in 3D and download.',
   overview:'Overview',overview_hint:'Hover for values. All structures are currently amorphous.',
   chart_sys:'Top 15 material systems (by count)',chart_natom:'Atom-count distribution',chart_dens:'Number-density distribution (Atom/Å³)',
   explore:'Explore structures',pt_hint:'Click the periodic table to filter (structures containing ALL selected elements); refine with search/dropdowns; click a row for 3D preview.',
   clear:'Clear elements',search_ph:'Search formula / system / source path…',
   c_formula:'Formula',c_system:'System',c_phase:'Phase',c_temp:'Temp',c_natoms:'Atoms',c_density:'Density',c_frame:'Frame',c_view:'View',
   view:'▶ 3D',t_total:'Structures',t_sys:'Material systems',t_natoms:'Atom-count range',t_dens:'Median density',t_phase:'Phase',phase_amor:'amorphous',
   shown:(a,b)=>`Showing ${a} / ${b}`,sel_none:'No elements selected',sel_pre:'Selected: ',
   dl_poscar:'⬇ Download POSCAR',toggle_style:'Toggle style (ball-stick/space-fill)',
   m_natoms:'Atoms',m_dens:'Density',m_temp:'Temperature',m_phase:'Phase',m_contrib:'Contributor',m_src:'HPC source',
   footer:'Data and code live in this repository. Build the main DB: python scripts/build_asedb.py; query: ase db data/pcm.db; contribute: python scripts/add_structure.py (see README).',
   noload:'Cannot load data.json — open via HTTP or GitHub Pages, not by double-clicking the file.'}
};
let LANG=localStorage.getItem('pcm_lang')||'zh';
function t(k){const v=I18N[LANG][k];return v!==undefined?v:k;}
function applyI18n(){
  document.documentElement.lang=LANG;
  document.title=t('title');
  document.querySelectorAll('[data-i18n]').forEach(e=>e.textContent=t(e.dataset.i18n));
  document.querySelectorAll('[data-i18n-ph]').forEach(e=>e.placeholder=t(e.dataset.i18nPh));
  document.getElementById('langBtn').textContent=LANG==='zh'?'EN':'中';
  if(DATA){buildTiles();renderCharts();renderTable();renderSelEls();}
}

/* ---------- tooltip / theme ---------- */
const tt=document.getElementById('tt');
function showTip(e,h){tt.innerHTML=h;tt.style.opacity=1;moveTip(e);}
function moveTip(e){tt.style.left=(e.clientX+14)+'px';tt.style.top=(e.clientY+14)+'px';}
function hideTip(){tt.style.opacity=0;}
document.addEventListener('mousemove',e=>{if(tt.style.opacity==1)moveTip(e);});
const rootEl=document.documentElement;
function curTheme(){return rootEl.getAttribute('data-theme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');}
document.getElementById('themeBtn').onclick=()=>{
  rootEl.setAttribute('data-theme',curTheme()==='dark'?'light':'dark');
  localStorage.setItem('pcm_theme',curTheme());
  if(DATA)renderCharts();
};
{const s=localStorage.getItem('pcm_theme');if(s)rootEl.setAttribute('data-theme',s);}
document.getElementById('langBtn').onclick=()=>{LANG=LANG==='zh'?'en':'zh';localStorage.setItem('pcm_lang',LANG);applyI18n();};

/* ---------- svg helpers ---------- */
const NS='http://www.w3.org/2000/svg';
function el(n,a){const x=document.createElementNS(NS,n);for(const k in a)x.setAttribute(k,a[k]);return x;}
let DATA=null;

function barChart(svg,rows,label,value){
  svg.innerHTML='';const W=svg.clientWidth||520,rh=26,padL=120,padR=48,padT=6;
  const H=rows.length*rh+padT+8;svg.setAttribute('viewBox',`0 0 ${W} ${H}`);svg.style.height=H+'px';
  const max=Math.max(...rows.map(value))||1,sc=(W-padL-padR)/max;
  rows.forEach((r,i)=>{const y=padT+i*rh,bw=Math.max(2,value(r)*sc);
    svg.appendChild(el('text',{x:padL-8,y:y+rh/2+3,'text-anchor':'end'})).textContent=label(r);
    const b=el('rect',{x:padL,y:y+4,width:bw,height:rh-11,rx:4,class:'bar'});
    b.addEventListener('mousemove',e=>showTip(e,`<b>${label(r)}</b><br>${value(r)}`));b.addEventListener('mouseleave',hideTip);
    svg.appendChild(b);svg.appendChild(el('text',{x:padL+bw+6,y:y+rh/2+3})).textContent=value(r);});
}
function histogram(svg,vals,fmt,unit){
  svg.innerHTML='';const W=svg.clientWidth||900,H=210,padL=44,padR=14,padT=10,padB=34;
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);svg.style.height=H+'px';
  const min=Math.min(...vals),max=Math.max(...vals),span=(max-min)||1,bins=Math.min(30,Math.max(12,Math.round(Math.sqrt(vals.length))));
  const bw=span/bins,cnt=new Array(bins).fill(0);
  vals.forEach(v=>{let b=Math.floor((v-min)/bw);if(b>=bins)b=bins-1;if(b<0)b=0;cnt[b]++;});
  const cmax=Math.max(...cnt)||1,plotW=W-padL-padR,plotH=H-padT-padB;
  for(let tck=0;tck<=4;tck++){const y=padT+plotH-plotH*tck/4;
    svg.appendChild(el('line',{x1:padL,y1:y,x2:W-padR,y2:y,class:'grid-line'}));
    svg.appendChild(el('text',{x:padL-6,y:y+3,'text-anchor':'end'})).textContent=Math.round(cmax*tck/4);}
  const cw=plotW/bins;
  cnt.forEach((c,i)=>{const x=padL+i*cw,bh=plotH*c/cmax;
    const b=el('rect',{x:x+1,y:padT+plotH-bh,width:Math.max(1,cw-2),height:bh,rx:3,class:'bar'});
    const lo=min+i*bw;b.addEventListener('mousemove',e=>showTip(e,`${fmt(lo)}–${fmt(lo+bw)} ${unit}<br><b>${c}</b>`));
    b.addEventListener('mouseleave',hideTip);svg.appendChild(b);});
  svg.appendChild(el('line',{x1:padL,y1:padT+plotH,x2:W-padR,y2:padT+plotH,class:'axis-line'}));
  for(let tck=0;tck<=5;tck++){svg.appendChild(el('text',{x:padL+plotW*tck/5,y:H-padB+18,'text-anchor':'middle'})).textContent=fmt(min+span*tck/5);}
}
function renderCharts(){
  const bySys={};DATA.forEach(r=>bySys[r.system]=(bySys[r.system]||0)+1);
  const top=Object.entries(bySys).sort((a,b)=>b[1]-a[1]).slice(0,15).map(([k,v])=>({k,v}));
  barChart(document.getElementById('sysChart'),top,r=>r.k,r=>r.v);
  histogram(document.getElementById('natomChart'),DATA.map(r=>r.natoms),v=>Math.round(v),'atoms');
  histogram(document.getElementById('densChart'),DATA.map(r=>r.density),v=>v.toFixed(3),'');
}

/* ---------- periodic table ---------- */
const PT=[
 ['H',null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,'He'],
 ['Li','Be',null,null,null,null,null,null,null,null,null,null,'B','C','N','O','F','Ne'],
 ['Na','Mg',null,null,null,null,null,null,null,null,null,null,'Al','Si','P','S','Cl','Ar'],
 ['K','Ca','Sc','Ti','V','Cr','Mn','Fe','Co','Ni','Cu','Zn','Ga','Ge','As','Se','Br','Kr'],
 ['Rb','Sr','Y','Zr','Nb','Mo','Tc','Ru','Rh','Pd','Ag','Cd','In','Sn','Sb','Te','I','Xe'],
 ['Cs','Ba','La','Hf','Ta','W','Re','Os','Ir','Pt','Au','Hg','Tl','Pb','Bi','Po','At','Rn'],
 ['Fr','Ra','Ac','Rf','Db','Sg','Bh','Hs','Mt','Ds','Rg','Cn','Nh','Fl','Mc','Lv','Ts','Og']
];
let SEL=new Set(), AVAIL=new Set();
function buildPT(){
  const g=document.getElementById('ptable');g.innerHTML='';
  PT.forEach(row=>row.forEach(sym=>{
    if(!sym){g.appendChild(Object.assign(document.createElement('div'),{className:'pt empty'}));return;}
    const d=document.createElement('div');d.textContent=sym;
    if(AVAIL.has(sym)){d.className='pt on';d.onclick=()=>{if(SEL.has(sym))SEL.delete(sym);else SEL.add(sym);
      d.classList.toggle('sel');renderSelEls();renderTable();};}
    else d.className='pt';
    g.appendChild(d);
  }));
}
function renderSelEls(){
  const s=document.getElementById('selEls');
  s.textContent=SEL.size?t('sel_pre')+[...SEL].join(' · '):t('sel_none');
}
document.getElementById('clearEls').onclick=()=>{SEL.clear();document.querySelectorAll('.pt.sel').forEach(e=>e.classList.remove('sel'));renderSelEls();renderTable();};

/* ---------- table ---------- */
let sortK='natoms',sortDir=-1;
function filtered(){
  const q=document.getElementById('q').value.toLowerCase().trim();
  const sf=document.getElementById('sysF').value,tf=document.getElementById('tempF').value;
  return DATA.filter(r=>{
    if(sf&&r.system!==sf)return false;
    if(tf&&r.temperature!==tf)return false;
    if(SEL.size&&![...SEL].every(e=>r.elements.includes(e)))return false;
    if(q&&!(r.formula.toLowerCase().includes(q)||r.system.toLowerCase().includes(q)||r.path.toLowerCase().includes(q)))return false;
    return true;
  });
}
function renderTable(){
  let rows=filtered();
  rows.sort((a,b)=>{let x=a[sortK],y=b[sortK];return typeof x==='string'?sortDir*x.localeCompare(y):sortDir*(x-y);});
  const tb=document.getElementById('tbody');tb.innerHTML='';const fr=document.createDocumentFragment();
  rows.forEach(r=>{const tr=document.createElement('tr');tr.onclick=()=>openViewer(r);
    tr.innerHTML=`<td>${r.formula}</td><td>${r.system}</td><td><span class="pill">${r.phase}</span></td>`+
      `<td>${r.temperature}</td><td class="num">${r.natoms}</td><td class="num">${r.density.toFixed(4)}</td>`+
      `<td>${r.source_frame}</td><td class="act">${t('view')}</td>`;fr.appendChild(tr);});
  tb.appendChild(fr);
  document.getElementById('shown').textContent=t('shown')(rows.length,DATA.length);
}
function buildTiles(){
  const ns=DATA.map(r=>r.natoms),ds=DATA.map(r=>r.density).slice().sort((a,b)=>a-b);
  const sys=new Set(DATA.map(r=>r.system));
  const tiles=[[t('t_total'),DATA.length],[t('t_sys'),sys.size],[t('t_natoms'),`${Math.min(...ns)}–${Math.max(...ns)}`],
    [t('t_dens'),ds[ds.length>>1].toFixed(3)],[t('t_phase'),t('phase_amor')]];
  document.getElementById('tiles').innerHTML=tiles.map(([l,v])=>`<div class="tile"><div class="v">${v}</div><div class="l">${l}</div></div>`).join('');
}
function initFilters(){
  const sc={},temps=new Set();DATA.forEach(r=>{sc[r.system]=(sc[r.system]||0)+1;temps.add(r.temperature);r.elements.forEach(e=>AVAIL.add(e));});
  const sysF=document.getElementById('sysF');sysF.innerHTML='';
  sysF.appendChild(Object.assign(document.createElement('option'),{value:'',textContent:LANG==='zh'?'全部体系':'All systems'}));
  Object.entries(sc).sort((a,b)=>b[1]-a[1]).forEach(([k,v])=>sysF.appendChild(Object.assign(document.createElement('option'),{value:k,textContent:`${k} (${v})`})));
  const tempF=document.getElementById('tempF');tempF.innerHTML='';
  tempF.appendChild(Object.assign(document.createElement('option'),{value:'',textContent:LANG==='zh'?'全部温度':'All temps'}));
  [...temps].sort().forEach(x=>tempF.appendChild(Object.assign(document.createElement('option'),{value:x,textContent:x})));
  ['q','sysF','tempF'].forEach(id=>document.getElementById(id).addEventListener('input',renderTable));
  document.querySelectorAll('th[data-k]').forEach(th=>th.onclick=()=>{const k=th.dataset.k;sortDir=(sortK===k)?-sortDir:1;sortK=k;renderTable();});
}

/* ---------- 3D viewer (Three.js, pretty-lattice aesthetic) ---------- */
let VIZ=null;                         // {colors, radii, material, lighting}
let three=null,curStyle='bs',curStruct=null;
function parsePoscar(txt){
  const L=txt.split(/\r?\n/);const s=parseFloat(L[1])||1;
  const v=i=>L[i].trim().split(/\s+/).map(Number);
  const a=v(2).map(x=>x*s),b=v(3).map(x=>x*s),c=v(4).map(x=>x*s);
  let idx=5,syms=null;
  if(/[A-Za-z]/.test(L[5])){syms=L[5].trim().split(/\s+/);idx=6;}
  const counts=L[idx].trim().split(/\s+/).map(Number);idx++;
  let m=L[idx].trim();if(/^[sS]/.test(m)){idx++;m=L[idx].trim();}
  const direct=/^[dD]/.test(m);idx++;
  if(!syms)syms=counts.map((_,i)=>['C','N','O','S'][i]||'X');
  const per=[];counts.forEach((n,i)=>{for(let k=0;k<n;k++)per.push(syms[i]);});
  const at=[];
  for(let i=0;i<per.length;i++){const p=v(idx+i);let x,y,z;
    if(direct){x=p[0]*a[0]+p[1]*b[0]+p[2]*c[0];y=p[0]*a[1]+p[1]*b[1]+p[2]*c[1];z=p[0]*a[2]+p[1]*b[2]+p[2]*c[2];}
    else{x=p[0]*s;y=p[1]*s;z=p[2]*s;}
    at.push({e:per[i],x,y,z});}
  return {a,b,c,at};
}
function elColor(el){return (VIZ&&VIZ.colors[el])||'#c8a2c8';}
function elRad(el,model){const r=VIZ&&VIZ.radii[el];return r?(r[model]||1):(model==='vdw'?1.8:1.2);}

function disposeThree(){
  if(!three)return;
  cancelAnimationFrame(three.raf);
  three.renderer.dispose();
  three.host.innerHTML='';
  three=null;
}
function buildStructure(){
  // 清掉旧的原子/键/盒子组，保留灯光/相机
  if(three.group){three.scene.remove(three.group);}
  const g=new THREE.Group();three.group=g;three.scene.add(g);
  const st=curStruct;
  const mat=new THREE.MeshStandardMaterial({metalness:VIZ.material.metalness,roughness:VIZ.material.roughness});
  // 原子（InstancedMesh，逐实例颜色+半径）
  const sph=new THREE.SphereGeometry(1,24,18);
  const im=new THREE.InstancedMesh(sph,mat,st.at.length);
  const dummy=new THREE.Object3D();const col=new THREE.Color();
  const model=curStyle==='sf'?'vdw':'atomic';
  const scale=curStyle==='sf'?1.0:0.42;
  st.at.forEach((p,i)=>{
    const rad=elRad(p.e,model)*scale;
    dummy.position.set(p.x,p.y,p.z);dummy.scale.setScalar(rad);dummy.updateMatrix();
    im.setMatrixAt(i,dummy.matrix);
    im.setColorAt(i,col.set(elColor(p.e)));
  });
  im.instanceMatrix.needsUpdate=true;if(im.instanceColor)im.instanceColor.needsUpdate=true;
  g.add(im);
  // 键（球棍模式，按半径和判定，直接距离）
  if(curStyle==='bs'){
    const bonds=[];const N=st.at.length;const BF=1.15;
    for(let i=0;i<N;i++)for(let j=i+1;j<N;j++){
      const A=st.at[i],B=st.at[j];
      const dx=A.x-B.x,dy=A.y-B.y,dz=A.z-B.z;const d2=dx*dx+dy*dy+dz*dz;
      const cut=(elRad(A.e,'atomic')+elRad(B.e,'atomic'))*BF;
      if(d2<cut*cut&&d2>0.64)bonds.push([i,j]);
    }
    if(bonds.length){
      const cyl=new THREE.CylinderGeometry(0.13,0.13,1,10,1,true);
      const bmat=new THREE.MeshStandardMaterial({color:0x9a9a9a,metalness:0.1,roughness:0.7});
      const bm=new THREE.InstancedMesh(cyl,bmat,bonds.length);
      const up=new THREE.Vector3(0,1,0);const q=new THREE.Quaternion();
      const va=new THREE.Vector3(),vb=new THREE.Vector3(),dir=new THREE.Vector3();
      bonds.forEach(([i,j],k)=>{
        const A=st.at[i],B=st.at[j];va.set(A.x,A.y,A.z);vb.set(B.x,B.y,B.z);
        dir.subVectors(vb,va);const len=dir.length();
        dummy.position.copy(va).addScaledVector(dir,0.5);
        q.setFromUnitVectors(up,dir.clone().normalize());dummy.quaternion.copy(q);
        dummy.scale.set(1,len,1);dummy.updateMatrix();bm.setMatrixAt(k,dummy.matrix);
      });
      bm.instanceMatrix.needsUpdate=true;g.add(bm);
    }
  }
  // 晶胞盒子
  const {a,b,c}=st;const O=[0,0,0];const ad=(u,w)=>[u[0]+w[0],u[1]+w[1],u[2]+w[2]];
  const P=[O,a,b,c,ad(a,b),ad(a,c),ad(b,c),ad(ad(a,b),c)];
  const E=[[0,1],[0,2],[0,3],[1,4],[1,5],[2,4],[2,6],[3,5],[3,6],[4,7],[5,7],[6,7]];
  const pts=[];E.forEach(([p,q])=>{pts.push(...P[p],...P[q]);});
  const lg=new THREE.BufferGeometry();lg.setAttribute('position',new THREE.Float32BufferAttribute(pts,3));
  g.add(new THREE.LineSegments(lg,new THREE.LineBasicMaterial({color:0x9a9a9a,transparent:true,opacity:0.5})));
  // 居中：晶胞几何中心
  const ctr=new THREE.Vector3((a[0]+b[0]+c[0])/2,(a[1]+b[1]+c[1])/2,(a[2]+b[2]+c[2])/2);
  g.position.set(-ctr.x,-ctr.y,-ctr.z);
  return Math.max(...[a,b,c].map(v=>Math.hypot(v[0],v[1],v[2])));
}
function openViewer(r){
  curStruct=null;curStyle='bs';
  document.getElementById('mTitle').textContent=`${r.formula}  ·  ${r.phase} ${r.temperature}`;
  const M=[['m_natoms',r.natoms],['m_dens',r.density.toFixed(4)],['m_temp',r.temperature],
    ['m_phase',r.phase],['m_contrib',r.contributor],['m_src',r.hpc_source]];
  document.getElementById('mMeta').innerHTML=M.map(([k,v])=>`<div><span>${t(k)}</span>${v}</div>`).join('');
  const dl=document.getElementById('mDownload');dl.href=`structures/${r.sid}.poscar`;dl.download=`${r.formula}_${r.sid}_POSCAR.vasp`;
  document.getElementById('modal').classList.add('open');
  const host=document.getElementById('viewer3d');host.innerHTML='<div class="load">…</div>';
  Promise.all([
    fetch(`structures/${r.sid}.poscar`).then(x=>x.text()),
    VIZ?Promise.resolve(VIZ):fetch('viz_assets.json').then(x=>x.json()).then(j=>VIZ=j),
  ]).then(([txt])=>{
    curStruct=parsePoscar(txt);
    host.innerHTML='';
    const w=host.clientWidth||680,h=host.clientHeight||400;
    const renderer=new THREE.WebGLRenderer({antialias:true});
    renderer.setPixelRatio(Math.min(devicePixelRatio,2));renderer.setSize(w,h);
    host.appendChild(renderer.domElement);
    const scene=new THREE.Scene();
    scene.background=new THREE.Color(getComputedStyle(document.body).getPropertyValue('--viewer-bg').trim()||'#fff');
    const camera=new THREE.PerspectiveCamera(45,w/h,0.1,8000);
    const controls=new THREE.OrbitControls(camera,renderer.domElement);
    controls.enableDamping=true;controls.dampingFactor=0.12;
    scene.add(new THREE.AmbientLight(0xffffff,VIZ.lighting.ambient));
    const dir=new THREE.DirectionalLight(0xffffff,VIZ.lighting.directional);
    dir.position.set(0.3,0.2,1);camera.add(dir);scene.add(camera);
    three={renderer,scene,camera,controls,host,group:null,raf:0};
    const R=buildStructure();
    const dist=R/Math.tan(Math.PI/8)*0.95;camera.position.set(dist*0.6,dist*0.45,dist);
    controls.update();
    (function loop(){three.raf=requestAnimationFrame(loop);controls.update();renderer.render(scene,camera);})();
  }).catch(e=>{host.innerHTML='<div class="load">3D 加载失败 / load failed</div>';});
}
document.getElementById('mClose').onclick=()=>{document.getElementById('modal').classList.remove('open');disposeThree();};
document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')document.getElementById('mClose').click();});
document.getElementById('mStyle').onclick=()=>{if(!three||!curStruct)return;curStyle=curStyle==='bs'?'sf':'bs';buildStructure();};

window.addEventListener('resize',()=>{if(DATA)renderCharts();});
fetch('data.json').then(r=>r.json()).then(d=>{
  DATA=d;initFilters();buildPT();applyI18n();
  const m=location.hash.match(/#view=(s\d+)/);
  if(m){const r=DATA.find(x=>x.sid===m[1]);if(r)openViewer(r);}
}).catch(()=>{document.getElementById('tbody').innerHTML=`<tr><td colspan="8" class="load">${t('noload')}</td></tr>`;});
</script>
