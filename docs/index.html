<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PCM Database</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="vendor/three.min.js"></script>
<script src="vendor/OrbitControls.js"></script>
<style>
:root{
  --plane:#f7f8fa; --surface:#ffffff; --soft:#f6f6f7; --ink:#1b1b1f; --ink2:#4b4b52; --muted:#8a8a91;
  --grid:#ececee; --axis:#c2c2c4; --series:#2f74dd; --series-soft:#e6effc;
  --accent2:#6366f1; --brand-3:#1e5bb8; --border:#e6e6e8;
  --grad:linear-gradient(120deg,#2f74dd 15%,#6366f1);
  --sh1:0 1px 2px rgba(0,0,0,.04),0 1px 2px rgba(0,0,0,.06);
  --sh2:0 3px 12px rgba(0,0,0,.06),0 1px 4px rgba(0,0,0,.05);
  --sh3:0 12px 32px rgba(0,0,0,.10),0 2px 6px rgba(0,0,0,.08);
  --sh5:0 18px 56px rgba(0,0,0,.16),0 4px 12px rgba(0,0,0,.16);
  --glow:rgba(47,116,221,.11); --viewer-bg:#ffffff;
  --art-bond:#b4bccb; --art-stroke:rgba(20,30,50,.12); --art-curve:#8b93a4; --art-accent:var(--series);
  --fn-pcm:#1e5bb8; --fn-ots:#1f8f5f; --fn-som:#7a3fc0; --fn-cand:#b3701a; --fn-other:#6b7280;
}
@media (prefers-color-scheme:dark){:root{
  --plane:#161618; --surface:#202127; --soft:#1b1b1f; --ink:#f5f5f7; --ink2:#c9c9cf; --muted:#8a8a91;
  --grid:#2c2c30; --axis:#3a3a3e; --series:#4a9eff; --series-soft:#16324f;
  --accent2:#8b9bff; --brand-3:#8cc2ff; --border:rgba(255,255,255,0.10);
  --grad:linear-gradient(120deg,#4a9eff 15%,#8b9bff);
  --sh1:0 1px 2px rgba(0,0,0,.2),0 1px 2px rgba(0,0,0,.3);
  --sh2:0 3px 12px rgba(0,0,0,.3),0 1px 4px rgba(0,0,0,.3);
  --sh3:0 12px 32px rgba(0,0,0,.4),0 2px 6px rgba(0,0,0,.4);
  --sh5:0 18px 56px rgba(0,0,0,.5),0 4px 12px rgba(0,0,0,.5);
  --glow:rgba(74,158,255,.13); --viewer-bg:#1b1b1f;
  --art-bond:#586274; --art-stroke:rgba(255,255,255,.14); --art-curve:#8791a3; --art-accent:var(--series);
  --fn-pcm:#8cc2ff; --fn-ots:#5fd39a; --fn-som:#c4a3f0; --fn-cand:#f0b566; --fn-other:#9aa0aa;
}}
:root[data-theme=dark]{
  --plane:#161618; --surface:#202127; --soft:#1b1b1f; --ink:#f5f5f7; --ink2:#c9c9cf; --muted:#8a8a91;
  --grid:#2c2c30; --axis:#3a3a3e; --series:#4a9eff; --series-soft:#16324f;
  --accent2:#8b9bff; --brand-3:#8cc2ff; --border:rgba(255,255,255,0.10);
  --grad:linear-gradient(120deg,#4a9eff 15%,#8b9bff);
  --sh1:0 1px 2px rgba(0,0,0,.2),0 1px 2px rgba(0,0,0,.3);
  --sh2:0 3px 12px rgba(0,0,0,.3),0 1px 4px rgba(0,0,0,.3);
  --sh3:0 12px 32px rgba(0,0,0,.4),0 2px 6px rgba(0,0,0,.4);
  --sh5:0 18px 56px rgba(0,0,0,.5),0 4px 12px rgba(0,0,0,.5);
  --glow:rgba(74,158,255,.13); --viewer-bg:#1b1b1f;
  --art-bond:#586274; --art-stroke:rgba(255,255,255,.14); --art-curve:#8791a3; --art-accent:var(--series);
  --fn-pcm:#8cc2ff; --fn-ots:#5fd39a; --fn-som:#c4a3f0; --fn-cand:#f0b566; --fn-other:#9aa0aa;
}
:root[data-theme=light]{
  --plane:#f7f8fa; --surface:#ffffff; --soft:#f6f6f7; --ink:#1b1b1f; --ink2:#4b4b52; --muted:#8a8a91;
  --grid:#ececee; --axis:#c2c2c4; --series:#2f74dd; --series-soft:#e6effc;
  --accent2:#6366f1; --brand-3:#1e5bb8; --border:#e6e6e8;
  --grad:linear-gradient(120deg,#2f74dd 15%,#6366f1);
  --sh1:0 1px 2px rgba(0,0,0,.04),0 1px 2px rgba(0,0,0,.06);
  --sh2:0 3px 12px rgba(0,0,0,.06),0 1px 4px rgba(0,0,0,.05);
  --sh3:0 12px 32px rgba(0,0,0,.10),0 2px 6px rgba(0,0,0,.08);
  --sh5:0 18px 56px rgba(0,0,0,.16),0 4px 12px rgba(0,0,0,.16);
  --glow:rgba(47,116,221,.11); --viewer-bg:#ffffff;
  --art-bond:#b4bccb; --art-stroke:rgba(20,30,50,.12); --art-curve:#8b93a4; --art-accent:var(--series);
  --fn-pcm:#1e5bb8; --fn-ots:#1f8f5f; --fn-som:#7a3fc0; --fn-cand:#b3701a; --fn-other:#6b7280;
}
*{box-sizing:border-box}
html,body{margin:0;background:var(--plane);color:var(--ink);
  font-family:"Inter",system-ui,-apple-system,"Segoe UI",sans-serif;line-height:1.6;
  -webkit-text-size-adjust:100%;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
a{color:var(--series);text-decoration:none}a:hover{text-decoration:underline}
.wrap{max-width:1180px;margin:0 auto;padding:0 20px}
.topbar{position:absolute;top:18px;right:20px;display:flex;gap:8px;z-index:5}
.tbtn{background:var(--surface);color:var(--ink2);border:1px solid var(--border);border-radius:9px;
  padding:7px 13px;cursor:pointer;font-size:13px;font-family:inherit;font-weight:500;
  box-shadow:var(--sh1);transition:color .15s,border-color .15s,box-shadow .15s,transform .15s}
.tbtn:hover{color:var(--series);border-color:var(--series);box-shadow:var(--sh2)}
.tbtn:active{transform:translateY(1px)}
header{position:relative;padding:60px 0 30px;overflow:hidden}
header::before{content:"";position:absolute;top:-160px;left:-80px;width:520px;height:360px;
  background:radial-gradient(closest-side,var(--glow),transparent 70%);pointer-events:none;z-index:0}
header>*{position:relative;z-index:1}
.hero{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,44%);gap:10px;align-items:center}
.hero-text{min-width:0}
.hero-art{position:relative;min-width:0}
.hero-art .concept{width:100%;height:auto;display:block;
  -webkit-mask-image:linear-gradient(to right,transparent 0%,rgba(0,0,0,.35) 16%,#000 40%);
  mask-image:linear-gradient(to right,transparent 0%,rgba(0,0,0,.35) 16%,#000 40%)}
.hero-art::before{content:"";position:absolute;inset:0;z-index:1;pointer-events:none;
  backdrop-filter:blur(7px);-webkit-backdrop-filter:blur(7px);
  -webkit-mask-image:linear-gradient(to right,#000 0%,rgba(0,0,0,.5) 9%,transparent 20%);
  mask-image:linear-gradient(to right,#000 0%,rgba(0,0,0,.5) 9%,transparent 20%)}
.concept .ct-h{fill:var(--ink2);font-size:16px;font-weight:600;font-family:inherit}
.concept .ct-a{fill:var(--art-accent);font-size:14px;font-weight:600;font-family:inherit}
.concept .ct-s{fill:var(--muted);font-size:12.5px;font-weight:500;font-family:inherit}
@media(max-width:860px){.hero{grid-template-columns:1fr}.hero-art{display:none}}
.eyebrow{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--series);font-weight:700}
h1{font-size:clamp(34px,5.2vw,52px);line-height:1.08;margin:.28em 0 .18em;letter-spacing:-.025em;font-weight:800;
  background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.sub{color:var(--ink2);max-width:66ch;font-size:16px;line-height:1.65}
.tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin:30px 0 6px}
.tile{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 20px;
  box-shadow:var(--sh2);transition:transform .18s,box-shadow .18s}
.tile:hover{transform:translateY(-3px);box-shadow:var(--sh3)}
.tile .v{font-size:30px;font-weight:750;letter-spacing:-.03em;font-variant-numeric:tabular-nums;
  background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.tile .v.tv{font-size:clamp(18px,2.4vw,24px);line-height:1.25}
.tile .l{font-size:12.5px;color:var(--muted);margin-top:4px;font-weight:500}
section{padding:34px 0}
h2{font-size:22px;letter-spacing:-.01em;margin:0 0 4px;font-weight:700}
.hint{color:var(--muted);font-size:13px;margin:0 0 18px;max-width:78ch}
.charts{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:22px}
@media(max-width:820px){.charts{grid-template-columns:1fr}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px 20px 14px;
  box-shadow:var(--sh2);transition:transform .18s,box-shadow .18s}
.card:hover{box-shadow:var(--sh3)}
.card.full{grid-column:1/-1}
.card h3{font-size:14px;margin:0 0 14px;font-weight:600;color:var(--ink)}
svg{display:block;width:100%;overflow:visible}
.bar{fill:var(--series);transition:fill .12s} .bar:hover{fill:var(--accent2)}
.gbar{transition:opacity .12s} .gbar:hover{opacity:.82}
text{fill:var(--ink2);font-size:11px;font-family:inherit}
.axis-line{stroke:var(--axis);stroke-width:1} .grid-line{stroke:var(--grid);stroke-width:1}
.tt{position:fixed;pointer-events:none;background:var(--ink);color:var(--surface);padding:7px 10px;border-radius:8px;
  font-size:12px;opacity:0;transition:opacity .1s;z-index:60;white-space:nowrap;box-shadow:var(--sh3);font-weight:500}
/* periodic table */
.ptable{display:grid;grid-template-columns:repeat(18,1fr);gap:3px;max-width:760px;margin:4px auto 6px}
.pt{aspect-ratio:1;border:1px solid var(--border);border-radius:4px;background:var(--surface);
  display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--muted);user-select:none}
.pt{transition:transform .1s,box-shadow .1s}
.pt.on{cursor:pointer;font-weight:600}
.pt.on:hover{transform:translateY(-2px);box-shadow:var(--sh2);outline:2px solid var(--series);outline-offset:-2px}
.pt.sel{background:var(--series)!important;color:#fff!important;border-color:var(--series);box-shadow:var(--sh2)}
.pt.empty{border:none;background:transparent}
.ptrow{display:flex;gap:10px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
.controls{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px;align-items:center}
.controls input,.controls select{background:var(--surface);color:var(--ink);border:1px solid var(--border);
  border-radius:9px;padding:9px 12px;font-size:13.5px;font-family:inherit;transition:border-color .15s,box-shadow .15s}
.controls input:focus,.controls select:focus{outline:none;border-color:var(--series);
  box-shadow:0 0 0 3px var(--series-soft)}
.controls input[type=search]{min-width:220px;flex:1}
.cbox{position:relative;display:inline-block}
.cbox-btn{background:var(--surface);color:var(--ink);border:1px solid var(--border);
  border-radius:9px;padding:9px 12px;font-family:inherit;font-size:13.5px;cursor:pointer;
  display:inline-flex;align-items:center;transition:border-color .15s,box-shadow .15s}
.cbox-btn:focus,.cbox-btn.open{outline:none;border-color:var(--series);box-shadow:0 0 0 3px var(--series-soft)}
/* 统一下拉外观：原生 select 与自定义按钮共用同一个 chevron 与留白 */
.controls select,.controls .cbox-btn{-webkit-appearance:none;appearance:none;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path d='M1 1.5 6 6.5 11 1.5' fill='none' stroke='%236b7280' stroke-width='1.6' stroke-linecap='round' stroke-linejoin='round'/></svg>");
  background-repeat:no-repeat;background-position:right 12px center;padding-right:32px}
/* 外层只负责圆角+裁剪，滚动交给内层 .cbox-list，避免滚动条把圆角切平 */
.cbox-pop{position:absolute;z-index:40;top:calc(100% + 6px);left:0;min-width:230px;overflow:hidden;
  background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:var(--sh3)}
/* 半透明毛玻璃底色，贴近原生弹出菜单（不支持时回退为上面的实色） */
@supports ((backdrop-filter:blur(1px)) or (-webkit-backdrop-filter:blur(1px))){
  .cbox-pop{background:color-mix(in srgb,var(--surface) 72%,transparent);
    backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%)}
}
.cbox-pop[hidden]{display:none}
.cbox-list{max-height:340px;overflow-y:auto;overscroll-behavior:contain;padding:6px;scrollbar-width:thin}
.cbox-list::-webkit-scrollbar{width:9px}
.cbox-list::-webkit-scrollbar-track{background:transparent}
.cbox-list::-webkit-scrollbar-thumb{background:color-mix(in srgb,var(--muted) 45%,transparent);
  border-radius:9px;border:2px solid transparent;background-clip:content-box}
.cbox-grp{font-size:11px;color:var(--muted);font-weight:600;padding:7px 8px 2px}
.cbox-opt{padding:6px 8px;border-radius:6px;cursor:pointer;font-size:13px;white-space:nowrap}
.cbox-opt:hover{background:var(--series-soft)}
.cbox-opt.sel{color:var(--series);font-weight:600}
.cbox-more{width:100%;text-align:left;background:none;border:0;border-top:1px solid var(--border);
  margin-top:4px;padding:8px;color:var(--series);cursor:pointer;font:inherit;font-size:12.5px}
.count{color:var(--muted);font-size:12.5px;margin-left:auto;font-weight:500}
.tblwrap{overflow-x:auto;border:1px solid var(--border);border-radius:14px;background:var(--surface);box-shadow:var(--sh2)}
table{border-collapse:collapse;width:100%;font-size:13px}
th,td{text-align:left;padding:9px 9px;border-bottom:1px solid var(--border);white-space:nowrap}
td.fml,th.fml{max-width:210px;overflow:hidden;text-overflow:ellipsis}
th{position:sticky;top:0;background:var(--soft);cursor:pointer;user-select:none;font-weight:600;color:var(--ink2);z-index:1;
  font-size:12px;letter-spacing:.02em;text-transform:uppercase}
th:hover{color:var(--series)}
th.num .sind{margin-left:6px}
.sind{display:inline-flex;flex-direction:column;gap:2px;margin-left:6px;vertical-align:middle;position:relative;top:-1px}
.sind i{width:0;height:0;border-left:4px solid transparent;border-right:4px solid transparent}
.sind i.up{border-bottom:5px solid var(--axis)}
.sind i.dn{border-top:5px solid var(--axis)}
th.active.asc .sind i.up{border-bottom-color:var(--series)}
th.active.desc .sind i.dn{border-top-color:var(--series)}
th.active .sind i.up,th.active .sind i.dn{opacity:.35}
th.active.asc .sind i.up,th.active.desc .sind i.dn{opacity:1}
tbody tr:last-child td{border-bottom:none}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
td.path{max-width:300px;overflow:hidden;text-overflow:ellipsis;color:var(--muted);font-size:12px}
tbody tr{cursor:pointer;transition:background .12s} tbody tr:hover{background:var(--series-soft)}
.pill{display:inline-block;padding:2px 10px;border-radius:999px;font-size:11.5px;background:var(--series-soft);color:var(--brand-3);font-weight:600}
td.idx{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;color:var(--muted);letter-spacing:.3px}
tr.hi td{background:var(--series-soft)}
.vizpanel{width:100%;margin:14px auto 20px;background:var(--surface);border:1px solid var(--border);
  border-radius:14px;padding:14px 16px 16px;box-shadow:var(--sh1)}
.viztitle{margin:0 0 8px;font-size:15px}
.vizfoot{margin:8px 0 0;font-size:12px;color:var(--muted)}
.vizrow{display:flex;gap:16px;align-items:flex-start}
.vizmain{flex:3;min-width:0}
.vizctrl{flex:1;min-width:0;display:flex;flex-direction:column;gap:14px;padding-top:2px}
.vizc-grp{display:flex;flex-direction:column;gap:5px}
.vizc-lbl{font-size:12px;color:var(--muted);font-weight:600}
.vizctrl select{background:var(--surface);color:var(--ink);border:1px solid var(--border);
  border-radius:8px;padding:6px 8px;font:inherit;font-size:13px}
.vizctrl select:focus{outline:none;border-color:var(--series)}
.vizctrl input[type=range]{width:100%;accent-color:var(--series);cursor:pointer}
.vizc-chk{display:inline-flex;align-items:center;gap:6px;margin-top:2px;font-size:12px;color:var(--muted);cursor:pointer}
.vizc-chk input{accent-color:var(--series);cursor:pointer;margin:0}
.vizlegend{width:100%;display:flex;flex-wrap:wrap;align-items:center;gap:8px 12px;font-size:12px;color:var(--muted)}
.vizlegend .lgdc{-webkit-appearance:none;appearance:none;width:16px;height:16px;padding:0;border:1px solid var(--border);border-radius:50%;background:none;cursor:pointer;flex:none}
.vizlegend .lgdc::-webkit-color-swatch-wrapper{padding:0}
.vizlegend .lgdc::-webkit-color-swatch{border:none;border-radius:50%}
.vizlegend .lgdc::-moz-color-swatch{border:none;border-radius:50%}
.lgdreset{background:none;border:0;color:var(--series);cursor:pointer;font-size:11px;padding:2px 4px}
.cbar{width:100%;height:14px;border-radius:4px;border:1px solid var(--border)}
.cbar-lbl{width:100%;display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:3px}
.cbar-cap{width:100%;font-size:11px;color:var(--muted);margin-top:2px}
@media(max-width:820px){.vizrow{flex-direction:column}.vizmain,.vizctrl{width:100%;flex:none}}
#vizWrap,#mlipVizWrap{position:relative;width:100%}
#vizCanvas,#mlipCanvas{display:block;width:100%;height:440px;border-radius:10px;cursor:crosshair}
/* MLIP 数据集板块 */
.mlipbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin:18px 0 6px}
.mlipbar-lbl{font-size:12.5px;color:var(--muted);font-weight:500}
.chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--border);background:var(--surface);
  color:var(--muted);border-radius:999px;padding:5px 12px;font-size:12.5px;font-family:inherit;font-weight:500;
  cursor:pointer;transition:color .12s,border-color .12s,background .12s}
.chip .dot{width:9px;height:9px;border-radius:50%;flex:none;opacity:.35;transition:opacity .12s}
.chip.on{color:var(--ink);border-color:currentColor;background:color-mix(in srgb,currentColor 8%,var(--surface))}
.chip.on .dot{opacity:1}
.chip:hover{border-color:var(--series)}
.chartfoot{font-size:11px;color:var(--muted);margin:8px 0 0;line-height:1.5}
#mlipTbl th{cursor:default}#mlipTbl th:hover{color:var(--ink2)}
#mlipTbl tbody tr{cursor:default}
#mlipTbl .dscell{display:inline-flex;align-items:center;gap:7px;font-weight:600}
#mlipTbl .dscell .dot{width:9px;height:9px;border-radius:50%;flex:none}
.vizbar{display:flex;flex-wrap:wrap;gap:12px;align-items:center;padding:2px 4px 10px;font-size:12.5px;color:var(--muted)}
.vizbar .lgd,.vizlegend .lgd{display:inline-flex;align-items:center;gap:5px}
.vizbar .dot,.vizlegend .dot{width:10px;height:10px;border-radius:50%;display:inline-block;flex:none}
.pill.fn-pcm{color:var(--fn-pcm)} .pill.fn-ots{color:var(--fn-ots)} .pill.fn-som{color:var(--fn-som)}
.pill.fn-cand{color:var(--fn-cand)} .pill.fn-other{color:var(--fn-other)}
.pill.fn-pcm,.pill.fn-ots,.pill.fn-som,.pill.fn-cand,.pill.fn-other{background:color-mix(in srgb,currentColor 15%,transparent)}
.pager{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:16px}
.pager #pageInfo{font-size:13px;color:var(--ink2);min-width:120px;text-align:center;font-variant-numeric:tabular-nums}
.pager .tbtn{padding:5px 12px}
.pager .tbtn:disabled{opacity:.4;cursor:default}
.act{color:var(--series);font-weight:600}
footer{padding:34px 0 70px;color:var(--muted);font-size:12.5px;border-top:1px solid var(--border);margin-top:20px}
code{background:var(--soft);border:1px solid var(--border);border-radius:6px;padding:1px 6px;font-size:12px;
  font-family:ui-monospace,Menlo,Consolas,monospace}
.load{padding:40px;text-align:center;color:var(--muted)}
/* modal */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
.modal.open{display:flex}
.mbox{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:min(720px,100%);max-height:92vh;
  overflow:auto;box-shadow:var(--sh5)}
.mhead{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.mhead h3{margin:0;font-size:17px}
.mclose{background:none;border:none;color:var(--ink2);font-size:20px;cursor:pointer;line-height:1}
#viewer3d{width:100%;height:400px;position:relative;background:var(--viewer-bg)}
#viewer3d canvas,#upViewer canvas{border-radius:0}
.mmeta{padding:14px 20px;display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px 18px;font-size:13px}
.mmeta div span{color:var(--muted);display:block;font-size:11.5px}
.mmeta .mnote{grid-column:1/-1;font-size:11.5px;color:var(--muted);line-height:1.5;margin-top:2px}
.mcolors{padding:2px 20px 12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.mcolors .mclabel{font-size:12px;color:var(--muted)}
.mcchip{display:inline-flex;align-items:center;gap:5px;font-size:12.5px;color:var(--ink2);
  border:1px solid var(--border);border-radius:999px;padding:2px 4px 2px 9px}
.mcchip input[type=color]{width:22px;height:22px;border:none;background:none;padding:0;cursor:pointer;border-radius:50%}
.mcreset{font-size:12px;color:var(--series);cursor:pointer;background:none;border:none;font-family:inherit}
.mfoot{padding:0 20px 18px;display:flex;gap:10px;flex-wrap:wrap}
.btn{display:inline-block;background:var(--series);color:#fff;border:none;border-radius:9px;padding:10px 17px;
  font-size:13.5px;font-weight:600;font-family:inherit;cursor:pointer;text-decoration:none;
  box-shadow:var(--sh1);transition:filter .15s,box-shadow .15s,transform .15s}
.btn:hover{filter:brightness(1.06);box-shadow:var(--sh2);text-decoration:none}
.btn:active{transform:translateY(1px)}
.btn.ghost{background:var(--surface);color:var(--ink2);border:1px solid var(--border);box-shadow:none}
.btn.ghost:hover{color:var(--series);border-color:var(--series)}
.btn:disabled{opacity:.5;cursor:default}
.upform{padding:14px 20px 4px}
.upform>.upfile{display:block;font-size:13px;color:var(--ink2);margin-bottom:10px}
.upform input[type=file]{display:block;margin-top:6px;font-size:13px}
.upcalc{background:var(--plane);border:1px solid var(--border);border-radius:8px;padding:10px 12px;
  font-size:13px;margin-bottom:12px;font-variant-numeric:tabular-nums;color:var(--ink2)}
.upcalc b{color:var(--ink)}
.upgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px;margin-bottom:6px}
.upgrid label{display:flex;flex-direction:column;gap:4px;font-size:12.5px;color:var(--muted)}
.upgrid .upwide{grid-column:1/-1}
.upgrid input,.upgrid select{background:var(--surface);color:var(--ink);border:1px solid var(--border);
  border-radius:7px;padding:7px 10px;font-size:13.5px;font-family:inherit}
</style>
</head>

let LANG=localStorage.getItem('pcm_lang')||'zh';
function t(k){const v=I18N[LANG][k];return v!==undefined?v:k;}
function applyI18n(){
  document.documentElement.lang=LANG;
  document.title=t('title');
  document.querySelectorAll('[data-i18n]').forEach(e=>e.textContent=t(e.dataset.i18n));
  document.querySelectorAll('[data-i18n-ph]').forEach(e=>e.placeholder=t(e.dataset.i18nPh));
  document.querySelectorAll('[data-i18n-title]').forEach(e=>e.title=t(e.dataset.i18nTitle));
  document.getElementById('langBtn').textContent=LANG==='zh'?'EN':'中';
  if(DATA){renderTiles();renderCharts();renderTable();renderSelEls();buildCboxItems();if(vizState){renderVizBar(vizState);renderLegend();}}
  renderMlip();
}
function renderTiles(){
  const box=document.getElementById('tiles');if(!box||!DATA)return;
  const na=DATA.map(r=>r.natoms);
  const PL={amorphous:'phase_amor',crystalline:'phase_cryst',liquid:'phase_liq'};
  const order=['amorphous','liquid','crystalline'];
  const phases=[...new Set(DATA.map(r=>r.phase))].sort((a,b)=>order.indexOf(a)-order.indexOf(b));
  const phaseVal=phases.map(p=>t(PL[p]||'')||p).join(' · ');
  const items=[
    [DATA.length,t('t_total'),''],
    [new Set(DATA.map(r=>r.system)).size,t('t_sys'),''],
    [`${Math.min(...na)}–${Math.max(...na)}`,t('t_natoms'),''],
    [phaseVal,t('t_phase'),' tv'],
  ];
  box.innerHTML=items.map(([v,l,c])=>`<div class="tile"><div class="v${c}">${v}</div><div class="l">${l}</div></div>`).join('');
}

/* ---------- svg helpers ---------- */
const NS='http://www.w3.org/2000/svg';
function el(n,a){const x=document.createElementNS(NS,n);for(const k in a)x.setAttribute(k,a[k]);return x;}
function debounce(fn,ms){let h;return(...a)=>{clearTimeout(h);h=setTimeout(()=>fn(...a),ms);};}
let DATA=null;

function barChart(svg,rows,label,value){
  svg.innerHTML='';const W=svg.clientWidth||520,rh=20,padL=120,padR=48,padT=6;
  const H=rows.length*rh+padT+8;svg.setAttribute('viewBox',`0 0 ${W} ${H}`);svg.style.height=H+'px';
  const max=Math.max(...rows.map(value))||1,sc=(W-padL-padR)/max;
  const gid=(svg.id||'bc')+'-grad';                 // 玫瑰红→蓝 横向渐变（跨绘图区，条越长越偏蓝）
  const defs=el('defs',{}),lg=el('linearGradient',{id:gid,gradientUnits:'userSpaceOnUse',x1:padL,y1:0,x2:W-padR,y2:0});
  lg.appendChild(el('stop',{offset:'0%','stop-color':'#d6336c'}));
  lg.appendChild(el('stop',{offset:'55%','stop-color':'#8f4fd0'}));
  lg.appendChild(el('stop',{offset:'100%','stop-color':'#2f74dd'}));
  defs.appendChild(lg);svg.appendChild(defs);
  rows.forEach((r,i)=>{const y=padT+i*rh,bw=Math.max(2,value(r)*sc);
    svg.appendChild(el('text',{x:padL-8,y:y+rh/2+3,'text-anchor':'end'})).textContent=label(r);
    const b=el('rect',{x:padL,y:y+4,width:bw,height:rh-11,rx:4,class:'gbar',fill:`url(#${gid})`});
    b.addEventListener('mousemove',e=>showTip(e,`<b>${label(r)}</b><br>${value(r)}`));b.addEventListener('mouseleave',hideTip);
    svg.appendChild(b);svg.appendChild(el('text',{x:padL+bw+6,y:y+rh/2+3})).textContent=value(r);});
}
// 预分箱直方图：edges 长度 = counts 长度 + 1。opts={fmt,unit,logY}
// logY 用于力分布——原子级计数跨数个数量级，线性轴会把尾部压成零。
function histBars(svg,edges,counts,opts){
  const o=Object.assign({fmt:v=>v.toFixed(2),unit:'',logY:false},opts||{});
  svg.innerHTML='';const W=svg.clientWidth||900,H=210,padL=52,padR=14,padT=10,padB=34;
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);svg.style.height=H+'px';
  const bins=counts.length,min=edges[0],max=edges[bins],span=(max-min)||1;
  const plotW=W-padL-padR,plotH=H-padT-padB;
  const cmax=Math.max(...counts)||1;
  const tf=c=>o.logY?Math.log10(c+1):c,tmax=tf(cmax)||1;
  const yLab=f=>{const v=o.logY?Math.pow(10,tmax*f)-1:cmax*f;
    return v>=1e6?(v/1e6).toFixed(1)+'M':v>=1e3?(v/1e3).toFixed(0)+'k':Math.round(v);};
  for(let tck=0;tck<=4;tck++){const y=padT+plotH-plotH*tck/4;
    svg.appendChild(el('line',{x1:padL,y1:y,x2:W-padR,y2:y,class:'grid-line'}));
    svg.appendChild(el('text',{x:padL-6,y:y+3,'text-anchor':'end'})).textContent=yLab(tck/4);}
  const cw=plotW/bins;
  counts.forEach((c,i)=>{const x=padL+i*cw,bh=c?Math.max(1,plotH*tf(c)/tmax):0;
    const b=el('rect',{x:x+1,y:padT+plotH-bh,width:Math.max(1,cw-2),height:bh,rx:2,class:'bar'});
    const lo=edges[i],hi=edges[i+1];
    b.addEventListener('mousemove',e=>showTip(e,`${o.fmt(lo)} – ${o.fmt(hi)} ${o.unit}<br><b>${c.toLocaleString()}</b>`));
    b.addEventListener('mouseleave',hideTip);svg.appendChild(b);});
  svg.appendChild(el('line',{x1:padL,y1:padT+plotH,x2:W-padR,y2:padT+plotH,class:'axis-line'}));
  for(let tck=0;tck<=5;tck++){svg.appendChild(el('text',{x:padL+plotW*tck/5,y:H-padB+18,'text-anchor':'middle'})).textContent=o.fmt(min+span*tck/5);}
}
function elementCounts(){
  const c={};DATA.forEach(r=>r.elements.forEach(e=>c[e]=(c[e]||0)+1));return c;

}

const CBOX_TOP=10;

  sys:    {allKey:'sys_all',    grouped:true,  sel:'',items:[],expN:{},expanded:false},
  phase:  {allKey:'phase_all',  grouped:false, sel:'',items:[],expN:{},expanded:false},
  temp:   {allKey:'temp_all',   grouped:false, sel:'',items:[],expN:{},expanded:false},
  func:   {allKey:'func_all',   grouped:false, sel:'',items:[],expN:{},expanded:false},
  contrib:{allKey:'contrib_all',grouped:false, sel:'',items:[],expN:{},expanded:false},

function cboxRenderPop(k){
  const s=CBOX[k],pop=document.getElementById(k+'Pop');
  const opt=x=>`<div class="cbox-opt${s.sel===x.v?' sel':''}" data-v="${x.v}">${x.label}</div>`;
  const more=(g,exp,rest)=>`<button type="button" class="cbox-more" data-g="${g}">${exp?t('sys_less'):t('sys_more')(rest)}</button>`;
  let html=`<div class="cbox-opt${s.sel===''?' sel':''}" data-v="">${t(s.allKey)}</div>`;
  if(s.grouped){
    const byN={};s.items.forEach(x=>{(byN[x.n]=byN[x.n]||[]).push(x);});   // items 已按结构数降序 → 组内亦降序
    Object.keys(byN).map(Number).sort((a,b)=>a-b).forEach(n=>{
      const grp=byN[n],exp=!!s.expN[n],shown=exp?grp:grp.slice(0,CBOX_TOP);
      html+=`<div class="cbox-grp">${naryLabel(n)} · ${grp.length}</div>`;
      shown.forEach(x=>html+=opt(x));

  }else{
    const shown=s.expanded?s.items:s.items.slice(0,CBOX_TOP);

/* ---------- 3D viewer (Three.js, pretty-lattice aesthetic) ---------- */
let VIZ=null;                         // {colors, radii, material, lighting}
let three=null,curStyle='bs',curStruct=null;
function parsePoscar(txt){
  const L=txt.split(/\r?\n/);const s=parseFloat(L[1])||1;
  const v=i=>L[i].trim().split(/\s+/).map(Number);
  const a=v(2).map(x=>x*s),b=v(3).map(x=>x*s),c=v(4).map(x=>x*s);
  let idx=5,syms=null;
  if(/[A-Za-z]/.test(L[5])){syms=L[5].trim().split(/\s+/);idx=6;}
  const counts=L[idx].trim().split(/\s+/).map(Number);idx++;
  let m=L[idx].trim();if(/^[sS]/.test(m)){idx++;m=L[idx].trim();}
  const direct=/^[dD]/.test(m);idx++;
  if(!syms)syms=counts.map((_,i)=>['C','N','O','S'][i]||'X');
  const per=[];counts.forEach((n,i)=>{for(let k=0;k<n;k++)per.push(syms[i]);});
  const at=[];
  for(let i=0;i<per.length;i++){const p=v(idx+i);let x,y,z;
    if(direct){x=p[0]*a[0]+p[1]*b[0]+p[2]*c[0];y=p[0]*a[1]+p[1]*b[1]+p[2]*c[1];z=p[0]*a[2]+p[1]*b[2]+p[2]*c[2];}
    else{x=p[0]*s;y=p[1]*s;z=p[2]*s;}
    at.push({e:per[i],x,y,z});}
  return {a,b,c,at};
}
let COLOR_OVERRIDE={};try{COLOR_OVERRIDE=JSON.parse(localStorage.getItem('pcm_colors')||'{}');}catch(e){}
function elColor(el){return COLOR_OVERRIDE[el]||(VIZ&&VIZ.colors[el])||'#c8a2c8';}
function elRad(el,model){const r=VIZ&&VIZ.radii[el];return r?(r[model]||1):(model==='vdw'?1.8:1.2);}

/* pretty-lattice 材质预设（viz_assets.json 里原样嵌了它的 preset JSON，换风格＝换那段 JSON）。

   1) 无 ColorManagement：sRGB 十六进制色须手动转线性空间，否则配合 outputEncoding=sRGB 会发白。
   2) r128 的 shader 在 #ifndef PHYSICALLY_CORRECT_LIGHTS 下把 ambient/hemisphere/directional
      的 irradiance 统统乘 π；r171 已移除该分支。故必须开 physicallyCorrectLights，

// offset 随视距缩放，故缩放模型时高光位置不漂移（照抄 pretty-lattice 的 CameraHeadlight）。
function addPresetLights(scene,camera){
  const heads=[];

    const p=L.props||{},I=p.intensity===undefined?1:p.intensity;

    else if(L.type==='cameraDirectional'){

function syncHeadlights(st){

function disposeViewer(st){

function buildGroup(st){                       // 依据 st.struct + st.style 建/重建原子键盒

  const mat=presetMaterial('atom');
  const sph=new THREE.SphereGeometry(1,24,18);

    for(let i=0;i<N;i++)for(let j=i+1;j<N;j++){const A=S.at[i],B=S.at[j];
      const dx=A.x-B.x,dy=A.y-B.y,dz=A.z-B.z;const d2=dx*dx+dy*dy+dz*dz;
      const cut=(elRad(A.e,'atomic')+elRad(B.e,'atomic'))*BF;

    if(bonds.length){

      const cyl=new THREE.CylinderGeometry(0.13,0.13,1,10,1,true);
      const bm=new THREE.InstancedMesh(cyl,presetMaterial('bond'),bonds.length*2);
      const up=new THREE.Vector3(0,1,0),q=new THREE.Quaternion();
      const va=new THREE.Vector3(),vb=new THREE.Vector3(),dir=new THREE.Vector3(),nd=new THREE.Vector3();
      let k=0;

        bm.setMatrixAt(k,dummy.matrix);bm.setColorAt(k,col.set(elColor(B.e)).convertSRGBToLinear());k++;});

  const P=[[0,0,0],a,b,c,ad(a,b),ad(a,c),ad(b,c),ad(ad(a,b),c)];
  const E=[[0,1],[0,2],[0,3],[1,4],[1,5],[2,4],[2,6],[3,5],[3,6],[4,7],[5,7],[6,7]];
  const pts=[];E.forEach(([p,q])=>{pts.push(...P[p],...P[q]);});

function makeViewer(host,struct){              // 工厂：创建独立查看器实例

  const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true,preserveDrawingBuffer:true});

// 子集轴：对筛选子集做 z-score 标准化后再 PCA→2D。
// 协方差 C=AᵀA/m，用幂迭代取前两主成分（deflation）。
function pcaProject(rows){
  const m=rows.length,d=rows[0].length;
  const mean=new Float64Array(d),std=new Float64Array(d);
  for(const r of rows)for(let j=0;j<d;j++)mean[j]+=r[j];
  for(let j=0;j<d;j++)mean[j]/=m;
  for(const r of rows)for(let j=0;j<d;j++){const t=r[j]-mean[j];std[j]+=t*t;}
  for(let j=0;j<d;j++){std[j]=Math.sqrt(std[j]/m)||1;}
  const A=new Float64Array(m*d);   // 标准化矩阵（已零均值单位方差）
  for(let i=0;i<m;i++){const r=rows[i],off=i*d;for(let j=0;j<d;j++)A[off+j]=(r[j]-mean[j])/std[j];}
  let totvar=0;for(let i=0;i<m*d;i++)totvar+=A[i]*A[i];totvar/=m;if(totvar<=0)totvar=1;
  function topPC(){
    let v=new Float64Array(d);for(let j=0;j<d;j++)v[j]=Math.sin(j*0.7+1);
    let lambda=0;
    for(let it=0;it<200;it++){
      const tv=new Float64Array(m);
      for(let i=0;i<m;i++){let s=0;const off=i*d;for(let j=0;j<d;j++)s+=A[off+j]*v[j];tv[i]=s;}
      const w=new Float64Array(d);
      for(let i=0;i<m;i++){const s=tv[i],off=i*d;for(let j=0;j<d;j++)w[j]+=A[off+j]*s;}
      for(let j=0;j<d;j++)w[j]/=m;
      let norm=0;for(let j=0;j<d;j++)norm+=w[j]*w[j];norm=Math.sqrt(norm)||1;
      for(let j=0;j<d;j++)w[j]/=norm;
      let diff=0;for(let j=0;j<d;j++)diff+=Math.abs(w[j]-v[j]);
      v=w;lambda=norm;if(diff<1e-7)break;
    }
    return {v,lambda};
  }
  const pc1=topPC(),proj1=new Float64Array(m);
  for(let i=0;i<m;i++){let s=0;const off=i*d;for(let j=0;j<d;j++)s+=A[off+j]*pc1.v[j];proj1[i]=s;}
  for(let i=0;i<m;i++){const p=proj1[i],off=i*d;for(let j=0;j<d;j++)A[off+j]-=p*pc1.v[j];}
  const pc2=topPC(),proj2=new Float64Array(m);
  for(let i=0;i<m;i++){let s=0;const off=i*d;for(let j=0;j<d;j++)s+=A[off+j]*pc2.v[j];proj2[i]=s;}
  return {x:proj1,y:proj2,ev1:pc1.lambda/totvar,ev2:pc2.lambda/totvar};
}

function contColors(items,get,cmapName,rev){

  let lo=quantile(vv,CLIP[0]),hi=quantile(vv,CLIP[1]);
  if(!(hi>lo)){lo=vv[0]??0;hi=vv[vv.length-1]??lo+1;}if(!(hi>lo))hi=lo+1;

  return {colors:items.map(r=>{const v=get(r);return (v==null||!isFinite(v))?'#c0c0c0':cmapColor(cmapName,(v-lo)/(hi-lo),rev);}),
          colorInfo:{lo,hi,clipped}};

function niceTicks(min,max,n){
  const span=(max-min)||1,raw=span/n,mag=Math.pow(10,Math.floor(Math.log10(raw))),norm=raw/mag;

  const sx=v=>pX+(v-V.xmin)/(V.xmax-V.xmin)*pW,sy=v=>pY+pH-(v-V.ymin)/(V.ymax-V.ymin)*pH;
  const css=getComputedStyle(document.body);
  const grid=css.getPropertyValue('--border').trim()||'#e6e6e8';
  const muted=css.getPropertyValue('--muted').trim()||'#8a8a8a';
  // 灰色网格线 + 刻度值
  ctx.font='10px ui-sans-serif,system-ui';ctx.lineWidth=1;
  ctx.textAlign='center';ctx.textBaseline='top';
  niceTicks(V.xmin,V.xmax,8).forEach(v=>{const X=sx(v);if(X<pX-0.5||X>pX+pW+0.5)return;
    ctx.strokeStyle=grid;ctx.globalAlpha=0.6;ctx.beginPath();ctx.moveTo(X,pY);ctx.lineTo(X,pY+pH);ctx.stroke();
    ctx.globalAlpha=1;ctx.fillStyle=muted;ctx.fillText(v.toFixed(2),X,pY+pH+5);});
  ctx.textAlign='right';ctx.textBaseline='middle';
  niceTicks(V.ymin,V.ymax,6).forEach(v=>{const Y=sy(v);if(Y<pY-0.5||Y>pY+pH+0.5)return;
    ctx.strokeStyle=grid;ctx.globalAlpha=0.6;ctx.beginPath();ctx.moveTo(pX,Y);ctx.lineTo(pX+pW,Y);ctx.stroke();
    ctx.globalAlpha=1;ctx.fillStyle=muted;ctx.fillText(v.toFixed(2),pX-6,Y);});
  // x/y 轴（PC=0 处，若在视野内加深显示）
  ctx.strokeStyle=muted;ctx.globalAlpha=0.55;ctx.lineWidth=1.3;
  if(0>V.ymin&&0<V.ymax){const Y=sy(0);ctx.beginPath();ctx.moveTo(pX,Y);ctx.lineTo(pX+pW,Y);ctx.stroke();}
  if(0>V.xmin&&0<V.xmax){const X=sx(0);ctx.beginPath();ctx.moveTo(X,pY);ctx.lineTo(X,pY+pH);ctx.stroke();}
  ctx.globalAlpha=1;
  // 绘图区边框
  ctx.strokeStyle=grid;ctx.lineWidth=1;ctx.strokeRect(pX,pY,pW,pH);
  // 数据点（裁剪到绘图区；仅可见点参与命中）
  ctx.save();ctx.beginPath();ctx.rect(pX,pY,pW,pH);ctx.clip();
  const {x,y,items}=st,pts=[];
  for(let i=0;i<items.length;i++){const cx=sx(x[i]),cy=sy(y[i]);
    if(cx<pX||cx>pX+pW||cy<pY||cy>pY+pH)continue;
    pts.push({px:cx,py:cy,r:items[i]});
    ctx.beginPath();ctx.arc(cx,cy,sizePx,0,6.2832);
    ctx.fillStyle=(st.colors&&st.colors[i])||'#888';ctx.globalAlpha=alpha;ctx.fill();
    ctx.globalAlpha=1;ctx.lineWidth=1;ctx.strokeStyle='rgba(0,0,0,.28)';ctx.stroke();}
  ctx.restore();
  st.pts=pts;
  // 框选叠加
  if(sel){const rx=Math.min(sel.x0,sel.x1),ry=Math.min(sel.y0,sel.y1),rw=Math.abs(sel.x1-sel.x0),rh=Math.abs(sel.y1-sel.y0);
    ctx.fillStyle='rgba(47,116,221,0.14)';ctx.strokeStyle='rgba(47,116,221,0.85)';ctx.lineWidth=1;
    ctx.fillRect(rx,ry,rw,rh);ctx.strokeRect(rx,ry,rw,rh);}
}
function drawViz(sel){drawScatterOn(document.getElementById('vizCanvas'),vizState,vizPointSize,vizPointAlpha,sel);}
// 通用交互：悬停 tooltip、框选缩放、点击回调。cfg={state,draw,size,tip,click}
function attachScatter(cv,cfg){
  let drag=null;                                     // {x0,y0,x1,y1,moved}
  const rel=e=>{const r=cv.getBoundingClientRect();return{mx:e.clientX-r.left,my:e.clientY-r.top};};
  const inPlot=(p,mx,my)=>p&&mx>=p.x&&mx<=p.x+p.w&&my>=p.y&&my<=p.y+p.h;
  cv.addEventListener('mousedown',e=>{const st=cfg.state();if(!st)return;const {mx,my}=rel(e);
    if(!inPlot(st.plot,mx,my))return;drag={x0:mx,y0:my,x1:mx,y1:my,moved:false};hideTip();});
  cv.addEventListener('mousemove',e=>{
    const st=cfg.state();if(!st)return;const {mx,my}=rel(e);
    if(drag){drag.x1=mx;drag.y1=my;if(Math.abs(mx-drag.x0)>4||Math.abs(my-drag.y0)>4)drag.moved=true;
      cfg.draw(drag.moved?drag:null);return;}
    if(!st.pts.length)return;
    let best=null,bd=1e9;const s=cfg.size(),tol=(s+5)*(s+5);
    for(const p of st.pts){const dx=p.px-mx,dy=p.py-my,dd=dx*dx+dy*dy;if(dd<bd){bd=dd;best=p;}}
    if(best&&bd<=tol){cv.style.cursor=cfg.click?'pointer':'default';st.hover=best;showTip(e,cfg.tip(best.r));}
    else{cv.style.cursor='crosshair';st.hover=null;hideTip();}
  });
  window.addEventListener('mouseup',()=>{
    const st=cfg.state();
    if(!drag||!st){drag=null;return;}
    const d=drag;drag=null;
    if(d.moved){                                     // 框选缩放
      const p=st.plot,V=st.view;
      const dataX=px=>V.xmin+(px-p.x)/p.w*(V.xmax-V.xmin),dataY=py=>V.ymin+(p.y+p.h-py)/p.h*(V.ymax-V.ymin);
      const nx0=dataX(Math.min(d.x0,d.x1)),nx1=dataX(Math.max(d.x0,d.x1));
      const ny0=dataY(Math.max(d.y0,d.y1)),ny1=dataY(Math.min(d.y0,d.y1));
      if(nx1-nx0>1e-9&&ny1-ny0>1e-9)st.view={xmin:nx0,xmax:nx1,ymin:ny0,ymax:ny1};
      cfg.draw();
    }else if(st.hover&&cfg.click){cfg.click(st.hover.r);}
  });
  cv.addEventListener('mouseleave',()=>{if(!drag){hideTip();const st=cfg.state();if(st)st.hover=null;}});
}
(function(){
  attachScatter(document.getElementById('vizCanvas'),{
    state:()=>vizState,draw:drawViz,size:()=>vizPointSize,

  revChk.onchange=()=>{vizCmapRev=revChk.checked;localStorage.setItem('pcm_viz_cmap_rev',vizCmapRev?'1':'0');recolor();};
  // 散点大小 / 透明度
  const szSel=document.getElementById('vizSize'),opSel=document.getElementById('vizOpacity');

  szSel.oninput=()=>{vizPointSize=+szSel.value;szVal.textContent=vizPointSize;localStorage.setItem('pcm_viz_size',vizPointSize);if(vizState)drawViz();};
  opSel.oninput=()=>{vizPointAlpha=+opSel.value;opVal.textContent=vizPointAlpha.toFixed(2);localStorage.setItem('pcm_viz_alpha',vizPointAlpha);if(vizState)drawViz();};
  window.addEventListener('resize',debounce(()=>{if(vizState)drawViz();},150));
})();

/* ---------- MLIP dataset：能量/受力分布 + SOAP-PCA 构型图 ---------- */
// mlip.json 轻量(~130KB)随页面加载；mlip_descriptors.json(~2.8MB) 等板块进入视口再取。
let MLIP=null,MDESC=null,MDESC_LOADING=null,MITEMS=[],mlipState=null;
let mlipSel=new Set();                                   // 选中的数据集 key
let mlipColorBy=localStorage.getItem('pcm_mlip_colorby')||'dataset';
let mlipCmap=localStorage.getItem('pcm_mlip_cmap')||'Viridis';
if(!CMAPS[mlipCmap])mlipCmap='Viridis';
let mlipCmapRev=localStorage.getItem('pcm_mlip_cmap_rev')==='1';
let mlipPointSize=+(localStorage.getItem('pcm_mlip_size')||3);
let mlipPointAlpha=+(localStorage.getItem('pcm_mlip_alpha')||0.7);
const MCONT={
  epa:{get:p=>p.epa,cap:()=>`${t('mlip_cb_epa')} (eV/atom)`,fmt:v=>v.toFixed(3)},
  frms:{get:p=>p.frms,cap:()=>`${t('mlip_cb_frms')} (eV/Å)`,fmt:v=>v.toFixed(3)},
  fmax:{get:p=>p.fmax,cap:()=>`${t('mlip_cb_fmax')} (eV/Å)`,fmt:v=>v.toFixed(2)},
  density:{get:p=>p.density,cap:()=>`${t('c_density')} (Atom/Å³)`,fmt:v=>v.toFixed(4)}
};
const dsKeys=()=>MLIP.datasets.map(d=>d.key);
const dsOf=k=>MLIP.datasets.find(d=>d.key===k);
function loadMdesc(){
  if(MDESC)return Promise.resolve(MDESC);
  if(MDESC_LOADING)return MDESC_LOADING;
  const dec=s=>{const bin=atob(s),n=bin.length,b=new Uint8Array(n);for(let i=0;i<n;i++)b[i]=bin.charCodeAt(i);return new Float32Array(b.buffer);};
  MDESC_LOADING=fetch('mlip_descriptors.json').then(r=>r.json()).then(p=>{MDESC={dim:p.dim,arr:dec(p.data)};return MDESC;});
  return MDESC_LOADING;
}
function renderMlipTiles(){
  const box=document.getElementById('mlipTiles'),m=MLIP.meta;
  const items=[[m.n_frames.toLocaleString(),t('mt_frames'),''],[m.n_atoms.toLocaleString(),t('mt_atoms'),''],
    [m.n_datasets,t('mt_ds'),''],[m.label_level,t('mt_label'),' tv']];
  box.innerHTML=items.map(([v,l,c])=>`<div class="tile"><div class="v${c}">${v}</div><div class="l">${l}</div></div>`).join('');
}
function renderMlipChips(){
  const box=document.getElementById('mlipChips');
  box.innerHTML=MLIP.datasets.map(d=>{const on=mlipSel.has(d.key);
    return `<button type="button" class="chip${on?' on':''}" data-ds="${d.key}" style="color:${on?catColor('dataset',d.key):''}">`+
      `<span class="dot" style="background:${catColor('dataset',d.key)}"></span>${d.key} <span style="opacity:.65">${d.n_frames.toLocaleString()}</span></button>`;}).join('');
  box.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{
    const k=b.dataset.ds;
    if(mlipSel.has(k)){if(mlipSel.size>1)mlipSel.delete(k);}else mlipSel.add(k);
    renderMlipChips();renderMlipCharts();updateMlipVizDebounced();});
}
function renderMlipTable(){
  const rows=MLIP.datasets.map(d=>`<tr>
    <td><span class="dscell"><span class="dot" style="background:${catColor('dataset',d.key)}"></span>${d.key}</span></td>
    <td>${d.label}</td><td class="num">${d.n_frames.toLocaleString()}</td><td class="num">${d.n_atoms.toLocaleString()}</td>
    <td class="num">${d.natoms_min}–${d.natoms_max}</td><td>${d.elements.join(' · ')}</td>
    <td class="num">${d.epa.min.toFixed(3)} … ${d.epa.max.toFixed(3)}</td>
    <td class="num">${d.fmag.max.toFixed(2)}</td></tr>`).join('');
  document.getElementById('mlipTbody').innerHTML=rows;
}
// 选中数据集的分箱计数逐箱相加（各数据集共享同一 edges，故可直接叠加）
// 返回 {counts, shown, outside, total}；outside = 落在显示范围外、未画出的样本数
function sumCounts(h){
  const keys=dsKeys().filter(k=>mlipSel.has(k));
  const n=h.edges.length-1,counts=new Array(n).fill(0);let outside=0;
  keys.forEach(k=>{h.counts[k].forEach((c,i)=>counts[i]+=c);outside+=h.outside[k][0]+h.outside[k][1];});
  const shown=counts.reduce((a,b)=>a+b,0);
  return {counts,shown,outside,total:shown+outside};
}
function renderMlipCharts(){
  const H=MLIP.hist;
  const epa=sumCounts(H.epa),fmag=sumCounts(H.fmag),fcomp=sumCounts(H.fcomp);
  histBars(document.getElementById('mlipEpaChart'),H.epa.edges,epa.counts,{fmt:v=>v.toFixed(2),unit:'eV/atom'});
  histBars(document.getElementById('mlipFmagChart'),H.fmag.edges,fmag.counts,{fmt:v=>v.toFixed(1),unit:'eV/Å',logY:true});
  histBars(document.getElementById('mlipFcompChart'),H.fcomp.edges,fcomp.counts,{fmt:v=>v.toFixed(1),unit:'eV/Å',logY:true});
  const foot=(id,key,r)=>document.getElementById(id).textContent=t(key)(r.total)+
    (r.outside?' '+t('mlip_clipped')(r.outside,100*r.outside/r.total):'');
  foot('mlipFootEpa','mlip_foot_epa',epa);
  foot('mlipFootFmag','mlip_foot_fmag',fmag);
  foot('mlipFootFcomp','mlip_foot_fcomp',fcomp);
}
function computeMlipColors(){
  if(!mlipState)return;const items=mlipState.items;
  if(MCONT[mlipColorBy]){const r=contColors(items,MCONT[mlipColorBy].get,mlipCmap,mlipCmapRev);
    mlipState.colors=r.colors;mlipState.colorInfo=r.colorInfo;}
  else{mlipState.colors=items.map(p=>catColor('dataset',p.ds));mlipState.colorInfo=null;}
}
function renderMlipLegend(){
  const box=document.getElementById('mlipLegend');if(!box)return;
  if(!mlipState){box.innerHTML='';return;}
  if(MCONT[mlipColorBy]){contLegend(box,MCONT[mlipColorBy],mlipState.colorInfo||{lo:0,hi:1},mlipCmap,mlipCmapRev);return;}
  const cats=dsKeys().filter(k=>mlipState.items.some(p=>p.ds===k));
  catLegend(box,'dataset',cats,k=>k,relegend=>{
    computeMlipColors();drawMlipViz();renderMlipChips();renderMlipTable();if(relegend)renderMlipLegend();});
}
// sel===undefined 表示一次「最终」重绘（非框选拖拽中），此时刷新状态栏里的视野外点数
function drawMlipViz(sel){
  drawScatterOn(document.getElementById('mlipCanvas'),mlipState,mlipPointSize,mlipPointAlpha,sel);
  if(sel===undefined&&mlipState)renderMlipVizBar(mlipState);
}
function setMlipView(v){if(mlipState){mlipState.view=Object.assign({},v);drawMlipViz();}}
function pad(xmin,xmax,ymin,ymax){
  const px=(xmax-xmin)*0.06||1,py=(ymax-ymin)*0.06||1;
  return {xmin:xmin-px,xmax:xmax+px,ymin:ymin-py,ymax:ymax+py};
}
// 训练集含 2–4 原子的二聚体/孤立原子构型（教势函数短程排斥）。它们在平均 SOAP 空间里
// 离主云极远，若按全域 min/max 定轴会把 90% 的点压成一个像素点。默认视野取 1–99% 分位，
// 离群点仍然画出，只是初始不在视野内——「全图」按钮可看全部。
function robustView(x,y){
  const sx=[...x].sort((a,b)=>a-b),sy=[...y].sort((a,b)=>a-b),q=0.01;
  let xmin=quantile(sx,q),xmax=quantile(sx,1-q),ymin=quantile(sy,q),ymax=quantile(sy,1-q);
  if(!(xmax>xmin)){xmin=sx[0];xmax=sx[sx.length-1];}
  if(!(ymax>ymin)){ymin=sy[0];ymax=sy[sy.length-1];}
  return pad(xmin,xmax,ymin,ymax);
}
function hiddenCount(st){
  const V=st.view;let n=0;
  for(let i=0;i<st.items.length;i++)if(st.x[i]<V.xmin||st.x[i]>V.xmax||st.y[i]<V.ymin||st.y[i]>V.ymax)n++;
  return n;
}
function renderMlipVizBar(st){
  const bar=document.getElementById('mlipVizBar');
  if(!st){bar.innerHTML=`<span>${t('mlip_none')}</span>`;return;}
  const hid=hiddenCount(st);
  bar.innerHTML=`<button class="tbtn" id="mlipReset">${t('reset')}</button>`+
    `<button class="tbtn" id="mlipFull">${t('mlip_fullext')}</button>`+
    `<span>${t('mlip_sampled')(st.items.length,MLIP.meta.n_frames)}</span>`+
    `<span>${t('viz_axis')(1,st.ev1)} · ${t('viz_axis')(2,st.ev2)}</span>`+
    (hid?`<span>${t('mlip_hidden')(hid)}</span>`:'');
  document.getElementById('mlipReset').onclick=()=>setMlipView(st.full);
  document.getElementById('mlipFull').onclick=()=>setMlipView(st.extent);
}
function updateMlipViz(){
  const bar=document.getElementById('mlipVizBar');if(!bar||!MLIP)return;
  bar.innerHTML=`<span>${t('mlip_loading')}</span>`;
  loadMdesc().then(D=>{
    const items=[],vecs=[];
    MITEMS.forEach(p=>{if(!mlipSel.has(p.ds))return;
      items.push(p);vecs.push(D.arr.subarray(p.i*D.dim,(p.i+1)*D.dim));});
    if(items.length<3){mlipState=null;renderMlipVizBar(null);renderMlipLegend();
      const cv=document.getElementById('mlipCanvas');cv.width=cv.clientWidth;cv.height=cv.clientHeight;
      cv.getContext('2d').clearRect(0,0,cv.width,cv.height);return;}
    const pca=pcaProject(vecs);
    const full=robustView(pca.x,pca.y);                 // 默认视野（1–99% 分位）
    const extent=pad(Math.min(...pca.x),Math.max(...pca.x),Math.min(...pca.y),Math.max(...pca.y));
    mlipState={items,x:pca.x,y:pca.y,ev1:pca.ev1,ev2:pca.ev2,pts:[],hover:null,
      full,extent,view:Object.assign({},full),plot:null,colors:null,colorInfo:null};
    computeMlipColors();drawMlipViz();renderMlipLegend();
  }).catch(()=>{bar.textContent=t('mlip_fail');});
}
const updateMlipVizDebounced=debounce(updateMlipViz,220);
function renderMlip(){                                   // 语言/主题切换后重绘（不重算 PCA）
  if(!MLIP)return;
  renderMlipTiles();renderMlipChips();renderMlipTable();renderMlipCharts();
  if(mlipState){renderMlipVizBar(mlipState);renderMlipLegend();}
  else if(!MDESC)document.getElementById('mlipVizBar').innerHTML=`<span>${t('mlip_loading')}</span>`;
}
(function(){
  const cv=document.getElementById('mlipCanvas');
  attachScatter(cv,{state:()=>mlipState,draw:drawMlipViz,size:()=>mlipPointSize,
    tip:p=>`<b>${p.fid}</b> · ${p.formula}<br>${p.natoms} atoms · ${p.epa.toFixed(3)} eV/atom<br>|F|max ${p.fmax.toFixed(2)} eV/Å`});
  const cb=document.getElementById('mlipColorBy'),cm=document.getElementById('mlipCmap'),rev=document.getElementById('mlipCmapRev');
  Object.keys(CMAPS).forEach(n=>cm.appendChild(Object.assign(document.createElement('option'),{value:n,textContent:n})));
  cb.value=mlipColorBy;cm.value=mlipCmap;rev.checked=mlipCmapRev;
  const syncCmapVis=()=>{document.getElementById('mlipCmapGroup').style.display=MCONT[mlipColorBy]?'':'none';};
  syncCmapVis();
  const recolor=()=>{if(mlipState){computeMlipColors();drawMlipViz();renderMlipLegend();}};
  cb.onchange=()=>{mlipColorBy=cb.value;localStorage.setItem('pcm_mlip_colorby',mlipColorBy);syncCmapVis();recolor();};
  cm.onchange=()=>{mlipCmap=cm.value;localStorage.setItem('pcm_mlip_cmap',mlipCmap);recolor();};
  rev.onchange=()=>{mlipCmapRev=rev.checked;localStorage.setItem('pcm_mlip_cmap_rev',mlipCmapRev?'1':'0');recolor();};
  const sz=document.getElementById('mlipSize'),op=document.getElementById('mlipOpacity');
  const szV=document.getElementById('mlipSizeVal'),opV=document.getElementById('mlipOpacityVal');
  sz.value=mlipPointSize;op.value=mlipPointAlpha;szV.textContent=mlipPointSize;opV.textContent=(+mlipPointAlpha).toFixed(2);
  sz.oninput=()=>{mlipPointSize=+sz.value;szV.textContent=mlipPointSize;localStorage.setItem('pcm_mlip_size',mlipPointSize);if(mlipState)drawMlipViz();};
  op.oninput=()=>{mlipPointAlpha=+op.value;opV.textContent=mlipPointAlpha.toFixed(2);localStorage.setItem('pcm_mlip_alpha',mlipPointAlpha);if(mlipState)drawMlipViz();};
  window.addEventListener('resize',debounce(()=>{if(MLIP)renderMlipCharts();if(mlipState)drawMlipViz();},150));
})();
fetch('mlip.json').then(r=>r.json()).then(d=>{
  MLIP=d;mlipSel=new Set(dsKeys());
  const P=d.points;
  MITEMS=P.ds.map((di,i)=>({i,ds:dsKeys()[di],fid:P.fid[i],formula:d.formulas[P.formula[i]],
    natoms:P.natoms[i],epa:P.epa[i],fmax:P.fmax[i],frms:P.frms[i],density:P.density[i]}));
  renderMlipTiles();renderMlipChips();renderMlipTable();renderMlipCharts();
  document.getElementById('mlipVizBar').innerHTML=`<span>${t('mlip_loading')}</span>`;
  // 描述符较大：板块首次进入视口时才拉取并作图
  const sec=document.getElementById('mlipSection');
  const io=new IntersectionObserver(es=>{if(es.some(e=>e.isIntersecting)){io.disconnect();updateMlipViz();}},{rootMargin:'200px'});
  io.observe(sec);
}).catch(()=>{document.getElementById('mlipTbody').innerHTML=`<tr><td colspan="8" class="load">${t('mlip_fail')}</td></tr>`;});

window.addEventListener('resize',debounce(()=>{if(DATA)renderCharts();},150));
fetch('data.json').then(r=>r.json()).then(d=>{
  DATA=d;initFilters();buildPT();applyI18n();updateViz();
  const m=location.hash.match(/#view=(s\d+)/);
  if(m){const r=DATA.find(x=>x.sid===m[1]);if(r)openViewer(r);}
}).catch(()=>{document.getElementById('tbody').innerHTML=`<tr><td colspan="11" class="load">${t('noload')}</td></tr>`;});
